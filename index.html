<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure File Download</title>

<style>

body{
font-family:Segoe UI, Arial;
background:#eef1f5;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
margin:0;
}

/* MAIN BOX */

.container{

background:white;
padding:40px;
width:420px;

border-radius:10px;

box-shadow:0 10px 40px rgba(0,0,0,0.2);

text-align:center;

}

button{

background:#ff7a00;

border:none;

padding:12px 20px;

color:white;

font-size:15px;

border-radius:6px;

cursor:pointer;

}

button:hover{
background:#e36800;
}

.hidden{
display:none;
}

/* EXPLORER WINDOW */

.explorer-window{

position:fixed;

bottom:40px;

left:50%;

transform:translateX(-50%) scale(.9);

width:520px;

background:white;

border-radius:8px;

box-shadow:0 30px 60px rgba(0,0,0,0.5);

font-family:Segoe UI;

display:none;

animation:explorerAppear .4s forwards;

}

@keyframes explorerAppear{

from{
opacity:0;
transform:translateX(-50%) scale(.85);
}

to{
opacity:1;
transform:translateX(-50%) scale(1);
}

}

/* HEADER */

.explorer-header{

background:#f3f3f3;

padding:10px;

border-bottom:1px solid #ddd;

font-weight:600;

}

/* FILE LIST */

.file-list{
padding:20px;
}

.file-item{

display:flex;

align-items:center;

gap:10px;

padding:12px;

border-radius:6px;

cursor:pointer;

}

.file-item:hover{
background:#e8f0fe;
}

.file-item img{
width:28px;
}

.file-name{
font-size:15px;
}

</style>
</head>

<body>

<div class="container">

<h2>Secure File Download</h2>

<p>This file requires verification before download.</p>

<button id="downloadBtn">Download File</button>

<div id="verification" class="hidden">

<p><b>Security verification required</b></p>

<p>Click verify to continue download.</p>

<button id="verifyBtn">Verify</button>

</div>

</div>

<!-- EXPLORER WINDOW -->

<div id="explorerWindow" class="explorer-window">

<div class="explorer-header">

File Explorer — Downloads

</div>

<div class="file-list">

<div class="file-item" id="targetFile">

<img src="https://cdn-icons-png.flaticon.com/512/888/888879.png">

<span class="file-name">Invoice_Document.zip</span>

</div>

</div>

</div>

<script>

document.getElementById("downloadBtn").onclick=function(){

document.getElementById("verification").classList.remove("hidden")

}

/* show explorer */

document.getElementById("verifyBtn").onclick=function(){

document.getElementById("explorerWindow").style.display="block"

}

/* simulate file execution */

document.getElementById("targetFile").onclick=function(){

alert("Demo: File would execute here (FileFix attack stage)")

}

</script>

</body>
</html>
